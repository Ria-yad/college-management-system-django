{% extends 'base.html' %}
{% block title %}Edit Session{% endblock %}
{% block content %}
<div class="page-header"><h2>Edit Session</h2><p>Update session information.</p></div>
<div class="card">
    <form method="post" class="form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}<small class="alert alert-error">{{ field.errors|striptags }}</small>{% endif %}
            </div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Update Session</button>
    </form>
</div>
{% endblock %}
